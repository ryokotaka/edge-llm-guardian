<text x="44" y="48" font-size="25" font-weight="700" fill="#16241f">Minimum-residence (dwell): switch economy trades against Q4 time</text>
<text x="44" y="78" font-size="14" fill="#56635f">Raspberry Pi 5 &#183; bounded look-ahead &#183; 10-min open-loop (4 s arrival, 150 req) &#183; gated start (&lt;= 50 &#176;C, 0x0).</text>
<text x="44" y="106" font-size="13.5" fill="#28406e"><tspan font-weight="700">Reading:</tspan> switches fall (36 &#8594; 7) only as Q4 residence rises &#8212; a trade-off, not a free win. Noisy (mostly N=1); no clean optimum.</text>
