<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640">
  <style>
    .bg{fill:#f7faf8}.title{font:700 30px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#17221d}.sub{font:18px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#5a6660}.card{fill:#fff;stroke:#d8e1dc;stroke-width:1.5}.label{font:700 20px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#1b2520}.small{font:15px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#65716b}.num{font:700 38px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#15211c}.ok{fill:#1f9d75}.warn{fill:#dc5a46}.blue{fill:#3f72d1}.muted{fill:#edf3f0}.axis{stroke:#d7dfdb;stroke-width:2}.tick{font:14px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#738079}.note{font:14px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#6c7772}.pill{fill:#e9f6f0}.pill2{fill:#f8e9e6}.pilltext{font:15px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#174d3c}.pilltext2{font:15px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#7a2e25}
  </style>
  <rect class="bg" width="1180" height="640"/>
  <text x="48" y="58" class="title">Fan-off thermal stress on Raspberry Pi 5</text>
  <text x="48" y="90" class="sub">N=3 per arm, 1200 s target, open-loop arrival every 6 s, active fan disconnected and airflow blocked.</text>

  <rect x="48" y="120" width="1084" height="70" rx="12" class="card"/>
  <text x="74" y="162" class="label">Finding:</text>
  <text x="160" y="162" class="sub">fixed Q8 hit Raspberry Pi thermal throttle in 3/3 runs; controller and fixed Q4 completed 3/3 with no throttle.</text>

  <rect x="48" y="220" width="330" height="250" rx="18" class="card"/>
  <text x="78" y="260" class="label">Q8 fixed</text>
  <rect x="78" y="282" width="120" height="34" rx="17" class="pill2"/>
  <text x="96" y="304" class="pilltext2">throttled 3/3</text>
  <text x="78" y="360" class="num">100</text>
  <text x="78" y="386" class="small">median completed requests</text>
  <text x="78" y="430" class="num">81.2°C</text>
  <text x="78" y="456" class="small">median peak temperature</text>
  <line x1="250" y1="326" x2="250" y2="430" stroke="#dc5a46" stroke-width="14" stroke-linecap="round"/>
  <circle cx="250" cy="326" r="14" class="warn"/>

  <rect x="425" y="220" width="330" height="250" rx="18" class="card"/>
  <text x="455" y="260" class="label">Controller</text>
  <rect x="455" y="282" width="130" height="34" rx="17" class="pill"/>
  <text x="476" y="304" class="pilltext">completed 3/3</text>
  <text x="455" y="360" class="num">200</text>
  <text x="455" y="386" class="small">median completed requests</text>
  <text x="455" y="430" class="num">77.4°C</text>
  <text x="455" y="456" class="small">median peak, Q4 fraction 0.74</text>
  <line x1="630" y1="352" x2="630" y2="430" stroke="#3f72d1" stroke-width="14" stroke-linecap="round"/>
  <circle cx="630" cy="352" r="14" class="blue"/>

  <rect x="802" y="220" width="330" height="250" rx="18" class="card"/>
  <text x="832" y="260" class="label">Q4 fixed</text>
  <rect x="832" y="282" width="130" height="34" rx="17" class="pill"/>
  <text x="853" y="304" class="pilltext">completed 3/3</text>
  <text x="832" y="360" class="num">200</text>
  <text x="832" y="386" class="small">median completed requests</text>
  <text x="832" y="430" class="num">79.0°C</text>
  <text x="832" y="456" class="small">median peak temperature</text>
  <line x1="1008" y1="342" x2="1008" y2="430" stroke="#1f9d75" stroke-width="14" stroke-linecap="round"/>
  <circle cx="1008" cy="342" r="14" class="ok"/>

  <line x1="80" y1="535" x2="1100" y2="535" class="axis"/>
  <text x="80" y="522" class="tick">target window: 1200 s / 200 requests</text>
  <rect x="80" y="552" width="245" height="34" rx="17" class="muted"/>
  <text x="102" y="574" class="small">start temps: 55.4-58.7°C</text>
  <rect x="345" y="552" width="230" height="34" rx="17" class="muted"/>
  <text x="367" y="574" class="small">throttle bit: 0x80000</text>
  <rect x="595" y="552" width="300" height="34" rx="17" class="muted"/>
  <text x="617" y="574" class="small">controller ceiling: 71.1°C, exceeded</text>
  <rect x="915" y="552" width="185" height="34" rx="17" class="muted"/>
  <text x="937" y="574" class="small">PMIC logged only</text>
  <text x="48" y="616" class="note">Summary from ignored local data path; output quality, LLM output safety, long-run stability, and hardware wear were not evaluated.</text>
</svg>
